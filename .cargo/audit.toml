# cargo-audit configuration
#
# RUSTSEC-2023-0071 — rsa "Marvin Attack" (timing sidechannel key recovery).
# Ignored because it is NOT reachable in this project:
#
#   1. The `rsa` crate is never compiled into either binary. It is a
#      lockfile-only phantom dependency, pulled transitively as
#      sqlx-macros-core -> sqlx-mysql -> rsa. sqlx-macros-core unconditionally
#      lists every driver crate for its compile-time query checks, but this hub
#      enables only the SQLite driver, so sqlx-mysql (and rsa) is never activated
#      in the build graph. `cargo tree -p hub-api -i rsa` reports it absent.
#   2. The codebase performs no RSA operations anywhere; all asymmetric crypto is
#      Ed25519 (ed25519-dalek). The Marvin attack targets RSA decryption/signing
#      timing — a code path that does not exist here.
#   3. No fixed version of `rsa` is published upstream (Solution: "No fixed
#      upgrade is available").
#
# Re-evaluate (and remove this entry) if a future sqlx release stops listing
# sqlx-mysql as an unconditional dependency of sqlx-macros-core, which would let
# the phantom drop out of Cargo.lock entirely.
[advisories]
ignore = ["RUSTSEC-2023-0071"]
